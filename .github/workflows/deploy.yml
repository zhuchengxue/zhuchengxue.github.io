name: Deploy blog to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: 1
      SITE_URL: ${{ vars.SITE_URL }}
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
      PUBLIC_GISCUS_REPO: ${{ vars.PUBLIC_GISCUS_REPO }}
      PUBLIC_GISCUS_REPO_ID: ${{ vars.PUBLIC_GISCUS_REPO_ID }}
      PUBLIC_GISCUS_CATEGORY: ${{ vars.PUBLIC_GISCUS_CATEGORY }}
      PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.PUBLIC_GISCUS_CATEGORY_ID }}
      PUBLIC_UMAMI_SCRIPT: ${{ vars.PUBLIC_UMAMI_SCRIPT }}
      PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.PUBLIC_UMAMI_WEBSITE_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm ci
      - name: Type check Astro files
        run: npx astro check
      - name: Check content
        run: npm run check:content
      - name: Test WeChat importer
        run: npm run test:wechat-import
      - name: Generate search index
        run: npm run search:index
      - name: Generate OG images
        run: npm run og:images
      - name: Build static site
        run: npx astro build
      - name: Check built site
        run: npm run check:build
      - name: Audit goal deliverables
        run: npm run audit
      - name: Report blog status
        run: npm run status
      - name: Write custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: printf '%s\n' "$CUSTOM_DOMAIN" > dist/CNAME
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
